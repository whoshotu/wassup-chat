services:
- type: web
  name: scaffolder-service
  runtime: docker
  dockerfilePath: Dockerfile
  dockerContext: scaffolder-service
  plan: free
  healthCheckPath: /health
  envVars:
  - key: LIBRETRANSLATE_URL
    value: "http://libretranslate:5000"
  - key: SCAFFOLDER_API_KEY
    value: "REDACTED"
  - key: TENANCY_ENABLED
    value: "true"
  - key: BULK_LANG_GEN
    value: "false"

- type: web
  name: wassup-frontend
  runtime: static
  buildCommand: "npm ci && npm run build"
  staticPublishPath: "./dist"
  envVars:
  - key: VITE_SCAFFOLDER_URL
    value: "REPLACE_ME_WITH_SCAFFOLDER_SERVICE_URL"

- type: web
  name: libretranslate
  runtime: image
  image:
    url: libretranslate/libretranslate:latest
  plan: free
  # Removed explicit healthCheckPath to let Render use its defaults with longer tolerance.
  # LibreTranslate boot up can take several minutes on free instances.
